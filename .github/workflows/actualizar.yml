name: Actualizar actividades CEP

on:
  push:
    branches: [main]
    paths: [build.py, collect.py, scraper.py]  # solo si cambia código fuente
  schedule:
    - cron: "0 22,2,6,10,14,18 * 4-10 *"   # Abr-Oct (CEST = UTC+2): 00,04,08,12,16,20h España
    - cron: "0 23,3,7,11,15,19 * 1-3,11,12 *"  # Nov-Mar (CET = UTC+1): 00,04,08,12,16,20h España
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Recoger actividades
        if: github.event_name != 'push'
        run: python collect.py

      - name: Generar sitio y RSS
        run: python build.py

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add data/ docs/
          git diff --staged --quiet && echo "Sin cambios" || (
            git commit -m "Actualizar actividades $(date -u +%Y-%m-%d)"
            git push
          )
