name: Actualizar actividades CEP

on:
  schedule:
    - cron: "0 6 * 4-10 *"    # Abr-Oct (CEST = UTC+2): 06:00 UTC → 08:00 España
    - cron: "0 7 * 1-3,11,12 *"  # Nov-Mar (CET = UTC+1):  07:00 UTC → 08:00 España
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Recoger actividades
        run: python collect.py

      - name: Generar sitio y RSS
        run: python build.py

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add data/ docs/
          git diff --staged --quiet && echo "Sin cambios" || (
            git commit -m "Actualizar actividades $(date -u +%Y-%m-%d)"
            git push
          )
