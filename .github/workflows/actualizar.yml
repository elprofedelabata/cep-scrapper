name: Actualizar actividades CEP

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 08:00 hora España (invierno 08:00, verano 09:00)
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Recoger actividades
        run: python collect.py

      - name: Generar sitio y RSS
        run: python build.py

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet && echo "Sin cambios" || (
            git commit -m "Actualizar actividades $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          )
